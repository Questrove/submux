name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cross-compile
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          build_date="$(git show -s --format=%cI HEAD)"
          ldflags="-s -w -X submux/internal/buildinfo.Version=${VERSION} -X submux/internal/buildinfo.Commit=${COMMIT} -X submux/internal/buildinfo.Date=${build_date}"
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/submux-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -buildvcs=false -ldflags="$ldflags" -o "$out" ./cmd/submux
          done
          for target in linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/submux-agent-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -buildvcs=false -ldflags="$ldflags" -o "$out" ./cmd/submux-agent
          done
          (cd dist && sha256sum submux-* > checksums.txt)
          ./dist/submux-linux-amd64 --version | grep -F "$VERSION"
          ./dist/submux-agent-linux-amd64 --version | grep -F "$VERSION"
          ls -la dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
