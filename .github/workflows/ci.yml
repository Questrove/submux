name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build (static, CGO_ENABLED=0)
        run: |
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -o /tmp/submux ./cmd/submux
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -o /tmp/submux-agent ./cmd/submux-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -buildvcs=false -o /tmp/submux-agent-arm64 ./cmd/submux-agent
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -buildvcs=false -o /tmp/submux-agent.exe ./cmd/submux-agent
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -trimpath -buildvcs=false -o /tmp/submux-agent-arm64.exe ./cmd/submux-agent

      - name: Installer syntax
        run: |
          bash -n scripts/install.sh
          bash -n scripts/install-agent.sh
          bash -n scripts/bootstrap-agent.sh
          bash -n scripts/test-installers.sh
          bash scripts/test-installers.sh

      - name: Windows installer syntax
        shell: pwsh
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path scripts/install-agent.ps1), [ref]$null, [ref]$errors)
          if ($errors.Count) { $errors | Format-List | Out-String | Write-Error }
