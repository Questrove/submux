name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build (static, CGO_ENABLED=0)
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/submux
